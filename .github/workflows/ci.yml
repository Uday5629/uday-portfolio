name: CI

# Quality gate that runs on every push / PR. Vercel handles the actual deploy
# via its GitHub integration; this workflow just verifies the build is healthy.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # `npm run build` also type-checks and lints the project, so it is the
      # real quality gate. (No standalone lint step: the project has no ESLint
      # config, and `next lint` would prompt interactively and hang in CI.)
      - name: Build
        run: npm run build
